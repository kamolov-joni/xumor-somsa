services:
  - type: web
    name: somsa-order-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false # Render dashboard'da qo'lda kiritiladi
      - key: TURSO_DATABASE_URL
        sync: false # Turso bazasi manzili (libsql://...)
      - key: TURSO_AUTH_TOKEN
        sync: false # Turso auth token
      # RENDER_EXTERNAL_URL ni Render avtomatik beradi — bot webhookni shundan oladi.
      # Webhook tufayli server uxlab qolsa ham, xabar kelganda uyg'onadi va buyurtma yo'qolmaydi.
